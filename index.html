<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#050816;
overflow:hidden;
color:#fff;
font-family:Arial;
}

/* 🌌 BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-2;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 26px;
background:rgba(0,0,0,.4);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(53,214,255,.25);
z-index:10;
}

.logo span:first-child{
color:#35d6ff;
font-weight:900;
text-shadow:0 0 10px #35d6ff;
}

.logo span:last-child{
color:#ff3355;
font-weight:900;
text-shadow:0 0 10px #ff3355;
}

button{
padding:10px 16px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:800;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:white;
}

/* SCREEN */
.screen{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

h1{
font-size:62px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* 📦 DEPLOY */
.deploy{
position:fixed;
bottom:12px;
right:12px;
padding:12px 14px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(53,214,255,.25);
backdrop-filter:blur(10px);
font-family:monospace;
font-size:12px;
min-width:240px;
}

#status{
font-weight:800;
color:#35ff9a;
margin-bottom:4px;
}

.warn #status{color:#ffcc00}
.error #status{color:#ff3355}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<div class="logo"><span>CapWorks</span> <span>Studio</span></div>
<button onclick="toggleProjects()">PROJECTS</button>
</header>

<div class="screen">
<h1>NEURAL DATA GRID</h1>
</div>

<!-- DEPLOY -->
<div id="deploy" class="deploy">
<div id="status">🟢 Site synchronisé</div>
<div id="info">Build stable</div>
</div>

<script>

/* =========================
   📐 FIXED PIPE NETWORK
   ========================= */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

let W,H;

function resize(){
W=canvas.width=innerWidth;
H=canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* 🔥 FIXED STRUCTURE (NO RANDOM AFTER CREATION) */
const GRID = [];

function buildGrid(){
GRID.length=0;

const stepX=220;
const stepY=160;

/* deterministic network */
for(let y=100;y<H-100;y+=stepY){
for(let x=100;x<W-100;x+=stepX){

if(x+stepX<W){
GRID.push({x1:x,y1:y,x2:x+stepX,y2:y});
}

if(y+stepY<H){
GRID.push({x1:x,y1:y,x2:x,y2:y+stepY});
}

}
}
}

buildGrid();

/* 💡 FLOW PARTICLE */
let flow=[];

function spawnFlow(){
if(GRID.length===0) return;

let g=GRID[Math.floor(Math.random()*GRID.length)];

flow.push({
g,
t:0,
speed:0.002 + Math.random()*0.001
});
}

/* 🎨 DRAW */
function draw(){
ctx.clearRect(0,0,W,H);

/* THICK DATA PIPES */
ctx.lineWidth=5;
ctx.strokeStyle="rgba(53,214,255,.18)";
ctx.shadowBlur=10;
ctx.shadowColor="#35d6ff";

/* draw grid */
for(let g of GRID){
ctx.beginPath();
ctx.moveTo(g.x1,g.y1);
ctx.lineTo(g.x2,g.y2);
ctx.stroke();
}

/* reset glow for particles */
ctx.shadowBlur=0;

/* FLOW LIGHT (SMOOTH, NOT POINTY) */
for(let i=flow.length-1;i>=0;i--){
let f=flow[i];
f.t+=f.speed;

let x=f.g.x1+(f.g.x2-f.g.x1)*f.t;
let y=f.g.y1+(f.g.y2-f.g.y1)*f.t;

/* glowing capsule instead of dot */
ctx.fillStyle="#35d6ff";
ctx.beginPath();
ctx.arc(x,y,4.2,0,Math.PI*2);
ctx.fill();

if(f.t>=1){
flow.splice(i,1);
}
}

/* controlled flow (not random chaos) */
if(Math.random()>0.92){
spawnFlow();
}

requestAnimationFrame(draw);
}

draw();

/* =========================
   📦 REAL STATUS SYSTEM
   ========================= */

const box=document.getElementById("deploy");
const status=document.getElementById("status");
const info=document.getElementById("info");

/* REAL STATE (NOT FAKE RANDOM) */
let state="ok";

function setState(s){
state=s;

box.className="deploy";

if(s==="ok"){
status.textContent="🟢 Site synchronisé";
info.textContent="Build stable";
}

if(s==="update"){
box.className="deploy warn";
status.textContent="🟡 Modifications détectées";
info.textContent="index.html + ui.css";
}

if(s==="deploy"){
box.className="deploy warn";
status.textContent="⏳ Déploiement en cours";
info.textContent="Sync Git pipeline...";
}

if(s==="error"){
box.className="deploy error";
status.textContent="🔴 Build failed";
info.textContent="Rollback active";
}
}

/* controlled simulation */
setTimeout(()=>setState("update"),3000);
setTimeout(()=>setState("deploy"),6000);
setTimeout(()=>setState("ok"),10000);

/* =========================
   📐 RESPONSIVE FIX (NO SHIFT)
   ========================= */
addEventListener("resize",()=>{
resize();
buildGrid(); /* recompute but stable structure */
});

/* PROJECTS BUTTON (placeholder clean) */
function toggleProjects(){
alert("PROJECTS UI à brancher ensuite (clean architecture prête)");
}

</script>

</body>
</html>
