<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio // Neural Interface</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#050816;
color:#d7e7ff;
font-family:Arial;
overflow-x:hidden;
cursor:none;
}

/* 🌌 BACKGROUND GRID */
body:before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(53,214,255,.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(53,214,255,.05) 1px,transparent 1px);
background-size:40px 40px;
z-index:-3;
}

/* ⚡ CURSOR */
.cursor{
position:fixed;
width:14px;height:14px;
border:2px solid #35d6ff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
box-shadow:0 0 12px #35d6ff;
z-index:999;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 42px;
background:rgba(0,0,0,.4);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(53,214,255,.2);
position:sticky;top:0;
z-index:10;
}

/* LOGO HACK STYLE */
.logo{
font-weight:900;
letter-spacing:2px;
}
.logo span:first-child{
color:#35d6ff;
text-shadow:0 0 12px #35d6ff;
}
.logo span:last-child{
color:#ff3355;
text-shadow:0 0 12px #ff3355;
}

/* LAYOUT */
.dashboard{
display:grid;
grid-template-columns:280px 1fr 320px;
gap:20px;
padding:30px;
min-height:100vh;
}

/* PANELS */
.panel{
background:rgba(255,255,255,.04);
border:1px solid rgba(53,214,255,.15);
border-radius:16px;
padding:18px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(53,214,255,.08);
}

.panel h3{
color:#35d6ff;
margin-bottom:10px;
}

/* LOGS */
.log{
font-family:monospace;
font-size:12px;
color:#9ecbff;
line-height:1.6;
height:200px;
overflow:hidden;
}

/* CENTER HERO */
.hero{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.hero h1{
font-size:52px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.scan{
margin-top:20px;
width:320px;
height:6px;
background:rgba(255,255,255,.1);
border-radius:10px;
overflow:hidden;
border:1px solid rgba(53,214,255,.2);
}

.scan div{
height:100%;
width:40%;
background:linear-gradient(90deg,#35d6ff,#ff3355);
animation:scan 2s infinite linear;
}

@keyframes scan{
0%{transform:translateX(-100%)}
100%{transform:translateX(300%)}
}

/* BUTTONS */
.btn{
margin-top:20px;
padding:12px 22px;
border-radius:12px;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:#fff;
font-weight:bold;
text-decoration:none;
box-shadow:0 0 20px rgba(53,214,255,.3);
}

/* RIGHT STATUS */
.status{
font-size:13px;
line-height:1.8;
color:#b7d7ff;
}

.ok{color:#35ff9a}
.warn{color:#ffcc00}
.bad{color:#ff3355}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<nav class="nav">
<div class="logo"><span>CapWorks</span> <span>Studio</span></div>
<div>NEURAL INTERFACE v2.0</div>
</nav>

<div class="dashboard">

<!-- LEFT PANEL -->
<div class="panel">
<h3>SYSTEM LOG</h3>
<div class="log" id="log"></div>
</div>

<!-- CENTER -->
<div class="hero">
<h1>CYBER STUDIO ACTIVE</h1>
<p>Interface créative sécurisée • Mode simulation</p>

<div class="scan"><div></div></div>

<a class="btn" href="#">ENTER DASHBOARD</a>
</div>

<!-- RIGHT -->
<div class="panel">
<h3>STATUS</h3>
<div class="status">
CPU : <span class="ok">STABLE</span><br>
NETWORK : <span class="ok">CONNECTED</span><br>
FIREWALL : <span class="ok">ACTIVE</span><br>
AI CORE : <span class="warn">LIMITED</span><br>
SECURITY : <span class="ok">GREEN</span>
</div>
</div>

</div>

<script>

/* cursor */
const c=document.getElementById("cursor");
addEventListener("mousemove",e=>{
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";
});

/* fake logs */
const log=document.getElementById("log");
const messages=[
"[SYS] Initialisation CapWorks Engine...",
"[NET] Secure connection established",
"[AI] Neural module loaded",
"[UI] Rendering cyber interface",
"[SEC] All systems verified",
"[OK] Studio ready",
"[SCAN] Monitoring active sessions..."
];

let i=0;
setInterval(()=>{
log.innerHTML+=messages[i%messages.length]+"<br>";
log.scrollTop=log.scrollHeight;
i++;
},900);

</script>

</body>
</html>
