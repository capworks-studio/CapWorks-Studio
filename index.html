<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#050816;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* 🌌 CANVAS */
canvas{
position:fixed;
inset:0;
z-index:-2;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(53,214,255,.2);
z-index:10;
}

.logo{
font-weight:900;
font-size:20px;
}
.logo span:first-child{
color:#35d6ff;
text-shadow:0 0 10px #35d6ff;
}
.logo span:last-child{
color:#ff3355;
text-shadow:0 0 10px #ff3355;
}

/* MENU */
.menu button{
padding:10px 16px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:800;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:white;
}

/* SCREEN */
.screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

h1{
font-size:60px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
opacity:.7;
margin-top:10px;
}

/* PROJECTS */
.projects{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.card{
width:260px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(53,214,255,.2);
transition:.2s;
}

.card:hover{
transform:translateY(-4px);
border-color:#35d6ff;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<div class="logo"><span>CapWorks</span> <span>Studio</span></div>
<div class="menu">
<button onclick="showProjects()">PROJECTS</button>
</div>
</header>

<!-- HOME -->
<div class="screen" id="home">
<h1>NEURAL SYSTEM</h1>
<p>Cyber infrastructure interface</p>
</div>

<script>

/* NAV SIMPLE */
function showProjects(){
document.getElementById("home").innerHTML=`
<h1>PROJECTS</h1>
<div class="projects">
<div class="card">🌐 SITES</div>
<div class="card">🎮 JEUX</div>
<div class="card">🧠 LOGICIELS</div>
<div class="card">📦 AUTRES</div>
</div>
`;
}

/* CANVAS */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* 🧠 PIPE NETWORK (POLYLINES CONNECTED) */
let pipes=[];

/* create bent pipes (L shaped paths) */
function createPipe(){
let x=Math.random()*c.width;
let y=Math.random()*c.height;

let segments=[];

for(let i=0;i<6;i++){
let dir=Math.random()<0.5?"x":"y";
let len=80+Math.random()*120;

if(dir==="x"){
segments.push({x1:x,y1:y,x2:x+len,y2:y});
x+=len;
}else{
segments.push({x1:x,y1:y,x2:x,y2:y+len});
y+=len;
}
}

pipes.push({segments});
}

/* initial network */
for(let i=0;i<10;i++)createPipe();

/* 💡 FLOW PARTICLES (SLOW + IRREGULAR) */
let particles=[];

function spawnParticle(){
let p=pipes[Math.floor(Math.random()*pipes.length)];
let s=p.segments[0];

particles.push({
seg:p.segments,
i:0,
t:0,
speed:0.002+Math.random()*0.003
});
}

/* LOOP */
function loop(){
ctx.clearRect(0,0,c.width,c.height);

/* DRAW PIPES */
ctx.lineWidth=2;
ctx.strokeStyle="rgba(53,214,255,.18)";

pipes.forEach(p=>{
p.segments.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s.x1,s.y1);
ctx.lineTo(s.x2,s.y2);
ctx.stroke();
});
});

/* FLOW (SLOW IRREGULAR LIGHT) */
particles.forEach((p,idx)=>{

let seg=p.seg[p.i];
if(!seg)return;

/* interpolation */
p.t+=p.speed;

let x=seg.x1+(seg.x2-seg.x1)*p.t;
let y=seg.y1+(seg.y2-seg.y1)*p.t;

ctx.fillStyle="rgba(53,214,255,.9)";
ctx.beginPath();
ctx.arc(x,y,2.2,0,Math.PI*2);
ctx.fill();

/* move segment */
if(p.t>=1){
p.i++;
p.t=0;

/* end of pipe */
if(p.i>=p.seg.length){
particles.splice(idx,1);
}
}
});

/* irregular spawn (NOT constant) */
if(Math.random()>0.85){
spawnParticle();
}

/* slowly generate more network */
if(Math.random()>0.98){
createPipe();
}

requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
