<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio // Game OS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial;
background:#050816;
color:#fff;
overflow:hidden;
cursor:none;
}

/* 🖱️ CURSOR */
.cursor{
position:fixed;
width:14px;height:14px;
border:2px solid #35d6ff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
box-shadow:0 0 10px #35d6ff;
z-index:999;
}

/* 🌌 BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-3;
transition:filter .8s;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 26px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(53,214,255,.2);
}

/* LOGO */
.logo span:first-child{color:#35d6ff;font-weight:900}
.logo span:last-child{color:#ff3355;font-weight:900}

/* MENU */
.menu{
display:flex;
gap:12px;
}

button{
padding:10px 16px;
border-radius:12px;
border:none;
font-weight:800;
cursor:pointer;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:#fff;
transition:.2s;
}

button:hover{transform:scale(1.05)}

.secondary{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.15);
}

/* 🧠 PANELS */
.page{
display:none;
height:calc(100vh - 70px);
padding:30px;
text-align:center;
}

.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* 🌦️ WEATHER */
.weatherBtn{
position:fixed;
bottom:10px;
right:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.smallBtn{
padding:8px 10px;
font-size:12px;
}

/* GAME */
.target{
position:absolute;
width:28px;
height:28px;
border-radius:50%;
background:#35d6ff;
box-shadow:0 0 15px #35d6ff;
cursor:pointer;
}

/* HUD */
#hud{
position:fixed;
bottom:10px;
left:10px;
font-family:monospace;
font-size:12px;
color:#35ff9a;
opacity:.8;
}

/* 🌪️ WEATHER EFFECTS */
.weather-rain canvas{filter:brightness(1.2)}
.weather-snow canvas{filter:contrast(1.2)}
.weather-storm canvas{filter:brightness(1.6)}
.weather-sun canvas{filter:sepia(.2) brightness(1.3)}
.weather-hail canvas{filter:contrast(1.5)}

/* TROLL MODE */
.troll button{
position:relative;
transition:.2s;
}

/* glitch */
.glitchFlash{
animation:flash .2s;
}
@keyframes flash{
0%{filter:brightness(1)}
50%{filter:brightness(2)}
100%{filter:brightness(1)}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<header>
<div class="logo"><span>CapWorks</span> <span>Studio</span></div>

<div class="menu">
<button onclick="openPage('home')">HOME</button>
<button onclick="openPage('projects')">PROJECTS</button>
<button onclick="openPage('game')">GAME</button>
<button class="secondary" onclick="toggleTroll()">TROLL MODE</button>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<h1>GAME OS READY</h1>
<p>Change météo, jouer, explorer projets</p>
</div>

<!-- PROJECTS -->
<div id="projects" class="page">
<h1>PROJECTS</h1>

<div class="menu" style="margin-top:20px">
<button onclick="projectTab('sites')">SITES</button>
<button onclick="projectTab('games')">JEUX</button>
<button onclick="projectTab('soft')">LOGICIELS</button>
<button onclick="projectTab('other')">AUTRES</button>
</div>

<div id="sites" class="card">Aranky / CapNews</div>
<div id="games" class="card" style="display:none">Mini games system</div>
<div id="soft" class="card" style="display:none">Tools & apps</div>
<div id="other" class="card" style="display:none">Experiments</div>
</div>

<!-- GAME -->
<div id="game" class="page">
<h1>DATA HUNTERS</h1>
<p>Attrape les voleurs avant la police ⚡</p>
</div>

<div id="hud">[SYS] Ready</div>

<!-- 🌦️ WEATHER CONTROL -->
<div class="weatherBtn">
<button class="smallBtn" onclick="setWeather('rain')">🌧️ Rain</button>
<button class="smallBtn" onclick="setWeather('storm')">⚡ Storm</button>
<button class="smallBtn" onclick="setWeather('sun')">☀️ Sun</button>
<button class="smallBtn" onclick="setWeather('snow')">❄️ Snow</button>
<button class="smallBtn" onclick="setWeather('hail')">🌨️ Hail</button>
</div>

<script>

/* CURSOR */
const cursor=document.getElementById("cursor");
addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* CANVAS */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight}
addEventListener("resize",resize);
resize();

/* RAIN */
let rain=[];
for(let i=0;i<160;i++){
rain.push({x:Math.random()*c.width,y:Math.random()*c.height,s:2+Math.random()*2})
}

/* WEATHER */
let weather="rain";

function setWeather(w){
weather=w;
document.body.className="weather-"+w;
hud("[SYS] Weather -> "+w.toUpperCase());
}

/* GAME TARGETS */
let targets=[];

function spawnTarget(){
let el=document.createElement("div");
el.className="target";
el.style.left=Math.random()*window.innerWidth+"px";
el.style.top=Math.random()*window.innerHeight+"px";

el.onclick=()=>{
el.remove();
hud("[OK] Data stolen recovered!");
};

document.body.appendChild(el);
targets.push(el);
}

/* GAME LOOP */
setInterval(()=>{
if(document.getElementById("game").classList.contains("active")){
spawnTarget();
}
},1200);

/* DRAW */
function loop(){
ctx.clearRect(0,0,c.width,c.height);

/* rain effect */
if(weather==="rain"||weather==="storm"){
ctx.strokeStyle="rgba(53,214,255,.2)";
for(let r of rain){
ctx.beginPath();
ctx.moveTo(r.x,r.y);
ctx.lineTo(r.x,r.y+10);
ctx.stroke();
r.y+=r.s;
if(r.y>c.height){r.y=0;r.x=Math.random()*c.width}
}
}

/* storm flash */
if(weather==="storm" && Math.random()>0.98){
document.body.classList.add("glitchFlash");
setTimeout(()=>document.body.classList.remove("glitchFlash"),120);
}

requestAnimationFrame(loop);
}
loop();

/* NAV */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
hud("[NAV] "+id.toUpperCase());
}

/* PROJECT TABS */
function projectTab(id){
["sites","games","soft","other"].forEach(i=>{
document.getElementById(i).style.display="none";
});
document.getElementById(id).style.display="block";
}

/* HUD */
const hudEl=document.getElementById("hud");
function hud(t){hudEl.textContent=t}

/* TROLL MODE */
let troll=false;

function toggleTroll(){
troll=!troll;
hud("[SYS] Troll mode "+(troll?"ON":"OFF"));
}

/* buttons escape */
setInterval(()=>{
if(troll){
document.querySelectorAll("button").forEach(b=>{
b.style.position="relative";
b.style.left=(Math.random()*40-20)+"px";
b.style.top=(Math.random()*20-10)+"px";
});
}
},400);

</script>

</body>
</html>
