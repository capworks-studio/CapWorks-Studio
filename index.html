<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio // GAME MODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#050816;
color:#fff;
font-family:Arial;
overflow:hidden;
cursor:none;
}

/* 🌧️ BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-3;
}

/* 🖱️ CURSOR */
.cursor{
position:fixed;
width:14px;height:14px;
border:2px solid #35d6ff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
box-shadow:0 0 12px #35d6ff;
z-index:999;
}

/* 🎬 BOOT SCREEN */
#boot{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#050816;
z-index:50;
}

#boot h1{
font-size:42px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#press{
margin-top:20px;
padding:12px 24px;
border:1px solid #35d6ff;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 15px #35d6ff;
}

/* ⏳ LOADING */
#loading{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:40;
background:#050816;
}

.bar{
width:300px;
height:8px;
background:rgba(255,255,255,.1);
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.bar div{
height:100%;
width:0%;
background:linear-gradient(90deg,#35d6ff,#ff3355);
}

/* 🎮 MENU */
#menu{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

h1{
font-size:70px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:20px;
padding:14px 26px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:#fff;
font-weight:800;
cursor:pointer;
box-shadow:0 0 20px rgba(53,214,255,.3);
transition:.2s;
}

.btn:hover{transform:scale(1.05)}

.small{
margin-top:12px;
opacity:.7;
}

/* 🧠 PANELS */
.panel{
display:none;
padding:40px;
text-align:center;
}

.card{
margin-top:20px;
padding:20px;
border:1px solid rgba(53,214,255,.2);
border-radius:16px;
background:rgba(255,255,255,.05);
}

/* glitch */
.glitch{
animation:glitch .2s infinite;
}
@keyframes glitch{
0%{transform:translate(0)}
25%{transform:translate(1px,-1px)}
50%{transform:translate(-1px,1px)}
75%{transform:translate(1px,1px)}
100%{transform:translate(0)}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cursor"></div>

<!-- 🎬 BOOT -->
<div id="boot">
<h1>CapWorks Studio</h1>
<div id="press">PRESS START</div>
</div>

<!-- ⏳ LOADING -->
<div id="loading">
<h2>Loading world...</h2>
<div class="bar"><div id="bar"></div></div>
</div>

<!-- 🎮 MENU -->
<div id="menu">
<h1 id="title">START GAME</h1>
<button class="btn" onclick="openPanel('play')">PLAY</button>
<button class="btn" onclick="openPanel('proj')">PROJECTS</button>
<button class="btn" onclick="openPanel('opt')">OPTIONS</button>
<div class="small">CapWorks Engine v1.0</div>
</div>

<!-- PANELS -->
<div id="play" class="panel">
<h1>GAME MODE</h1>
<div class="card">🎮 Simulation active</div>
<button class="btn" onclick="back()">BACK</button>
</div>

<div id="proj" class="panel">
<h1>PROJECTS</h1>
<div class="card">Aranky - Multiplayer world</div>
<div class="card">CapNews - Cyber journal</div>
<div class="card">Bosto - Simulation tools</div>
<button class="btn" onclick="back()">BACK</button>
</div>

<div id="opt" class="panel">
<h1>OPTIONS</h1>
<div class="card">Graphics: ULTRA</div>
<div class="card">Neon: ON</div>
<div class="card">Rain: ACTIVE</div>
<button class="btn" onclick="back()">BACK</button>
</div>

<script>

/* cursor */
const cursor=document.getElementById("cursor");
addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* 🌧️ RAIN */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight}
addEventListener("resize",resize);
resize();

let rain=[];
for(let i=0;i<200;i++){
rain.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
l:Math.random()*15+8,
s:Math.random()*2+1.5
});
}

function loop(){
ctx.clearRect(0,0,c.width,c.height);

ctx.strokeStyle="rgba(53,214,255,.2)";
for(let r of rain){
ctx.beginPath();
ctx.moveTo(r.x,r.y);
ctx.lineTo(r.x,r.y+r.l);
ctx.stroke();

r.y+=r.s;
if(r.y>c.height){r.y=-20;r.x=Math.random()*c.width}
}

requestAnimationFrame(loop);
}
loop();

/* 🎬 START */
document.getElementById("press").onclick=()=>{
document.getElementById("boot").style.display="none";
document.getElementById("loading").style.display="flex";

let bar=document.getElementById("bar");
let p=0;

let load=setInterval(()=>{
p+=2;
bar.style.width=p+"%";

if(p>=100){
clearInterval(load);
document.getElementById("loading").style.display="none";
document.getElementById("menu").style.display="flex";
document.getElementById("title").classList.add("glitch");
}
},30);
};

/* 🎮 NAV */
function openPanel(id){
document.getElementById("menu").style.display="none";
document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}

function back(){
document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
document.getElementById("menu").style.display="flex";
}

/* random glitch */
setInterval(()=>{
if(Math.random()>0.97){
document.body.style.filter="brightness(1.4)";
setTimeout(()=>document.body.style.filter="none",80);
}
},500);

</script>

</body>
</html>
