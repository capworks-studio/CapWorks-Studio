<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#050816;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* 🌌 BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-2;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(53,214,255,.2);
z-index:10;
}

.logo{
font-weight:900;
font-size:20px;
}
.logo span:first-child{
color:#35d6ff;
text-shadow:0 0 10px #35d6ff;
}
.logo span:last-child{
color:#ff3355;
text-shadow:0 0 10px #ff3355;
}

/* NAV */
nav{
display:flex;
gap:12px;
}

button{
padding:10px 16px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:800;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* PAGES */
.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding-top:70px;
}

.active{
display:flex;
}

h1{
font-size:64px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
opacity:.7;
margin-top:10px;
max-width:600px;
}

/* PROJECTS */
.grid{
margin-top:25px;
display:grid;
grid-template-columns:repeat(2,200px);
gap:12px;
}

.card{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(53,214,255,.2);
transition:.2s;
}

.card:hover{
transform:translateY(-4px);
border-color:#35d6ff;
}

/* RESPONSIVE */
@media(max-width:600px){
.grid{grid-template-columns:1fr}
h1{font-size:42px}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<div class="logo"><span>CapWorks</span> <span>Studio</span></div>

<nav>
<button onclick="show('home')">HOME</button>
<button onclick="show('projects')">PROJECTS</button>
</nav>
</header>

<!-- HOME -->
<div class="page active" id="home">
<h1>CAPWORKS STUDIO</h1>
<p>Design cyber, clean, moderne. Une base solide pour créer des expériences web interactives.</p>
</div>

<!-- PROJECTS -->
<div class="page" id="projects">
<h1>PROJECTS</h1>

<div class="grid">
<div class="card">🌐 SITES</div>
<div class="card">🎮 JEUX</div>
<div class="card">🧠 LOGICIELS</div>
<div class="card">📦 AUTRES</div>
</div>
</div>

<script>

/* NAV SYSTEM CLEAN */
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* 🌌 BACKGROUND NETWORK (CLEAN + STABLE) */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* FIXED GRID LINES */
const lines=[];

function build(){
lines.length=0;

const stepX=200;
const stepY=140;

for(let y=100;y<c.height-100;y+=stepY){
for(let x=100;x<c.width-100;x+=stepX){

lines.push({x1:x,y1:y,x2:x+stepX,y2:y});
lines.push({x1:x,y1:y,x2:x,y2:y+stepY});

}
}
}

build();

/* LIGHT FLOW */
let flow=[];

function spawnFlow(){
let l=lines[Math.floor(Math.random()*lines.length)];

flow.push({
l,
t:0,
speed:0.002 + Math.random()*0.002
});
}

/* DRAW */
function loop(){
ctx.clearRect(0,0,c.width,c.height);

/* cables */
ctx.lineWidth=4;
ctx.strokeStyle="rgba(53,214,255,.18)";
ctx.shadowBlur=10;
ctx.shadowColor="#35d6ff";

for(let l of lines){
ctx.beginPath();
ctx.moveTo(l.x1,l.y1);
ctx.lineTo(l.x2,l.y2);
ctx.stroke();
}

/* reset glow */
ctx.shadowBlur=0;

/* flowing light */
for(let i=flow.length-1;i>=0;i--){
let f=flow[i];
f.t+=f.speed;

let x=f.l.x1+(f.l.x2-f.l.x1)*f.t;
let y=f.l.y1+(f.l.y2-f.l.y1)*f.t;

ctx.fillStyle="#35d6ff";
ctx.beginPath();
ctx.arc(x,y,3.5,0,Math.PI*2);
ctx.fill();

if(f.t>=1){
flow.splice(i,1);
}
}

/* controlled animation */
if(Math.random()>0.9){
spawnFlow();
}

requestAnimationFrame(loop);
}

loop();

/* responsive rebuild clean */
addEventListener("resize",()=>{
resize();
build();
});

</script>

</body>
</html>
