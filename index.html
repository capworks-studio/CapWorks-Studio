<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#050816;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* 🌌 CANVAS BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-2;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(53,214,255,.2);
z-index:10;
}

.logo{
font-weight:900;
font-size:20px;
}
.logo span:first-child{
color:#35d6ff;
text-shadow:0 0 10px #35d6ff;
}
.logo span:last-child{
color:#ff3355;
text-shadow:0 0 10px #ff3355;
}

/* MENU */
.menu{
display:flex;
gap:12px;
}

button{
padding:10px 16px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:800;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* SCREENS */
.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.active{display:flex}

h1{
font-size:64px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUB TEXT */
p{
opacity:.8;
margin-top:10px;
}

/* PROJECTS */
.projects{
display:none;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.card{
padding:14px 18px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(53,214,255,.2);
transition:.2s;
width:260px;
}

.card:hover{
transform:translateY(-4px);
border-color:#35d6ff;
}

/* BACK */
.back{
margin-top:20px;
opacity:.7;
cursor:pointer;
}
.back:hover{
opacity:1;
color:#35d6ff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<div class="logo"><span>CapWorks</span> <span>Studio</span></div>

<div class="menu">
<button onclick="show('home')">START</button>
<button onclick="show('projects')">PROJECTS</button>
</div>
</header>

<!-- HOME -->
<div id="home" class="screen active">
<h1>PRESS START</h1>
<p>Cyber studio interface</p>
</div>

<!-- PROJECTS -->
<div id="projects" class="screen">
<h1>PROJECTS</h1>

<div class="projects" style="display:flex">
<div class="card">🌐 SITES</div>
<div class="card">🎮 JEUX</div>
<div class="card">🧠 LOGICIELS</div>
<div class="card">📦 AUTRES</div>
</div>

<div class="back" onclick="show('home')">← Retour</div>
</div>

<script>

/* NAV */
function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* 🌌 ELECTRIC BACKGROUND */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* ⚡ LINES */
let lines=[];

for(let i=0;i<18;i++){
lines.push({
x1:Math.random()*innerWidth,
y1:Math.random()*innerHeight,
x2:Math.random()*innerWidth,
y2:Math.random()*innerHeight
});
}

/* 💡 CURRENT MOVING */
let particles=[];

function spawnParticle(){
lines.forEach(l=>{
particles.push({
x:l.x1,
y:l.y1,
vx:(l.x2-l.x1)/80,
vy:(l.y2-l.y1)/80,
life:80
});
});
}

/* LOOP */
function loop(){
ctx.clearRect(0,0,c.width,c.height);

/* ELECTRIC LINES */
ctx.strokeStyle="rgba(53,214,255,.25)";
ctx.lineWidth=2;

lines.forEach(l=>{
ctx.beginPath();
ctx.moveTo(l.x1,l.y1);
ctx.lineTo(l.x2,l.y2);
ctx.stroke();
});

/* MOVING CURRENT */
ctx.fillStyle="#35d6ff";

particles.forEach((p,i)=>{
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();

p.x+=p.vx;
p.y+=p.vy;
p.life--;

if(p.life<=0)particles.splice(i,1);
});

/* respawn current */
if(Math.random()>0.92)spawnParticle();

requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
