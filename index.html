<style>
/* ═══════════════════════════════════════ VARIABLES & RESET ═══════════════════════════════════════ */
:root {
  --bg:       #05050a;
  --bg2:      #080810;
  --surface:  #0d0d18;
  --surface2: #121220;
  --surface3: #181828;
  --border:   #1e1e32;
  --border2:  #2a2a42;
  --accent:   #6c63ff;
  --accent2:  #8b83ff;
  --accentg:  rgba(108,99,255,.28);
  --cyan:     #00d4ff;
  --cyang:    rgba(0,212,255,.18);
  --green:    #00f593;
  --greeng:   rgba(0,245,147,.18);
  --red:      #ff4d6d;
  --redg:     rgba(255,77,109,.18);
  --gold:     #ffc947;
  --goldg:    rgba(255,201,71,.12);
  --pink:     #ff6ab0;
  --pinkg:    rgba(255,106,176,.15);
  --text:     #e8e8f4;
  --text2:    #9090b0;
  --text3:    #4a4a68;
  --radius:   14px;
  --font:     'Outfit', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}

*,*::before,*::after { margin:0;padding:0;box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

body::before {
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(108,99,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(108,99,255,.035) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;
}
body::after {
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);
  pointer-events:none;z-index:0;
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ═══════════════════════════════════════ HEADER ═══════════════════════════════════════ */
header {
  position:sticky;top:0;z-index:100;height:62px;
  padding:0 36px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(5,5,10,.88);backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border);
}
.logo {
  font-family:var(--mono);font-size:1rem;font-weight:700;
  display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text);
}
.logo-icon {
  width:30px;height:30px;border-radius:7px;overflow:hidden;
  background:linear-gradient(135deg,var(--accent),var(--cyan));
  box-shadow:0 0 18px var(--accentg);flex-shrink:0;
}
.logo-icon img{width:100%;height:100%;object-fit:cover}
.logo span{color:var(--cyan)}
nav{display:flex;align-items:center;gap:3px}
nav a{
  color:var(--text2);text-decoration:none;font-size:.82rem;font-weight:500;
  padding:6px 13px;border-radius:8px;transition:all .2s;
}
nav a:hover{color:var(--text);background:var(--surface2)}
nav a.active{color:var(--accent);background:rgba(108,99,255,.1)}
.header-right{display:flex;align-items:center;gap:8px}
.btn-ghost{
  background:transparent;border:1px solid var(--border2);color:var(--text2);
  padding:6px 13px;border-radius:8px;font-family:var(--mono);font-size:.7rem;
  font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.5px;
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{
  background:var(--accent);border:none;color:white;padding:7px 15px;
  border-radius:8px;font-family:var(--font);font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .2s;box-shadow:0 0 18px var(--accentg);
}
.btn-accent:hover{background:#7b73ff;transform:translateY(-1px)}
.user-chip{
  display:flex;align-items:center;gap:7px;padding:5px 11px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.user-chip:hover{border-color:var(--accent)}
.udot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
.udot.off{background:var(--text3);box-shadow:none}

/* ═══════════════════════════════════════ HERO ═══════════════════════════════════════ */
.hero{
  position:relative;z-index:1;text-align:center;
  padding:88px 40px 64px;overflow:hidden;
}
.hero-aurora{
  position:absolute;top:-120px;left:50%;transform:translateX(-50%);
  width:700px;height:520px;
  background:radial-gradient(ellipse at center,rgba(108,99,255,.1) 0%,rgba(0,212,255,.05) 45%,transparent 70%);
  pointer-events:none;filter:blur(1px);
}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:.66rem;color:var(--cyan);
  letter-spacing:2.5px;text-transform:uppercase;
  border:1px solid rgba(0,212,255,.22);background:rgba(0,212,255,.05);
  padding:5px 15px;border-radius:100px;margin-bottom:32px;
}
.hero-tag .pulse{
  width:6px;height:6px;border-radius:50%;background:var(--cyan);
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--cyang)}50%{opacity:.3;box-shadow:0 0 0 6px transparent}}
.hero h1{
  font-size:clamp(2.4rem,5.5vw,4.8rem);font-weight:900;line-height:1.06;
  letter-spacing:-2.5px;margin-bottom:16px;
}
.hero h1 em{
  font-style:normal;
  background:linear-gradient(120deg,var(--accent) 0%,var(--cyan) 50%,var(--pink) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 5s linear infinite;
}
@keyframes shimmer{to{background-position:200% center}}
.hero p{color:var(--text2);font-size:.92rem;max-width:440px;margin:0 auto 44px;line-height:1.85}

/* ═══════════════════════════════════════ SECTION ═══════════════════════════════════════ */
.section{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 40px 80px}
.section-head{margin-bottom:32px;display:flex;align-items:center;justify-content:space-between}
.section-label{
  font-family:var(--mono);font-size:.62rem;color:var(--accent);
  letter-spacing:3px;text-transform:uppercase;
}
.section-head h2{font-size:1.5rem;font-weight:800;letter-spacing:-1px}

/* ═══════════════════════════════════════ SEARCH ═══════════════════════════════════════ */
.search-wrap{
  position:relative;max-width:520px;margin:0 auto 52px;
}
.search-icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:1rem;pointer-events:none;
}
.search-input{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:13px 48px;border-radius:12px;
  font-family:var(--font);font-size:.88rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentg)}
.search-input::placeholder{color:var(--text3)}
.search-clear{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:.85rem;padding:4px;border-radius:5px;transition:color .2s;display:none;
}
.search-clear:hover{color:var(--text)}

/* ═══════════════════════════════════════ CARDS ═══════════════════════════════════════ */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:transform .3s cubic-bezier(.2,.8,.3,1),border-color .3s,box-shadow .3s;
  animation:fadeUp .45s ease both;cursor:pointer;position:relative;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 20px 56px rgba(108,99,255,.14)}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--cyan));
  opacity:0;transition:opacity .3s;z-index:2;
}
.card:hover::before{opacity:1}
.card-media{
  position:relative;width:100%;background:var(--surface2);overflow:hidden;
}
.card-media.ratio-16-9{padding-top:56.25%}
.card-media.ratio-1-1{padding-top:100%}
.card-media.compact{height:140px;padding-top:0}
.card-media img,.card-media video,.card-media iframe{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.card-body{padding:18px 20px}
.card-title{font-size:1.05rem;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.card-desc{font-size:.8rem;color:var(--text2);line-height:1.6;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}

/* Buttons */
.btn-cta{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;font-size:.76rem;font-weight:600;
  cursor:pointer;transition:all .2s;border:none;text-decoration:none;
}
.btn-cta.primary{background:var(--accent);color:white;box-shadow:0 0 14px var(--accentg)}
.btn-cta.primary:hover{background:#7b73ff;transform:scale(1.03)}
.btn-cta.outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-cta.outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-cta.success{background:rgba(0,245,147,.12);color:var(--green);border:1px solid rgba(0,245,147,.3)}
.btn-cta.success:hover{background:rgba(0,245,147,.2);transform:scale(1.03)}

/* Like button */
.like-btn{
  display:flex;align-items:center;gap:5px;
  background:none;border:1px solid var(--border2);color:var(--text3);
  padding:6px 11px;border-radius:8px;font-size:.75rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:var(--font);
}
.like-btn:hover{border-color:var(--red);color:var(--red);background:var(--redg)}
.like-btn.liked{border-color:var(--red);color:var(--red);background:var(--redg)}
.like-btn.liked .like-ico{animation:heartBeat .35s ease}
@keyframes heartBeat{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ═══════════════════════════════════════ MODALS ═══════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.9);backdrop-filter:blur(14px);
  z-index:300;align-items:flex-start;justify-content:center;
  padding:24px;overflow-y:auto;
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  width:100%;max-width:760px;margin:auto;
  animation:modalIn .35s cubic-bezier(.2,.8,.3,1);position:relative;
}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{
  padding:22px 26px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-size:1rem;font-weight:800}
.modal-body{padding:22px 26px}
.modal-foot{padding:14px 26px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-close{background:transparent;border:1px solid var(--border2);color:var(--text2);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:.85rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-close:hover{border-color:var(--red);color:var(--red)}
.btn-primary{background:var(--accent);border:none;color:white;padding:10px 20px;border-radius:9px;font-family:var(--font);font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.btn-primary:hover{background:#7b73ff}
.btn-secondary{background:var(--surface3);color:var(--text2);border:1px solid var(--border2);padding:10px 20px;border-radius:9px;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:var(--accent);color:var(--text)}

.err-msg{color:var(--red);font-size:.74rem;margin-top:6px;font-family:var(--mono)}
.ok-msg{color:var(--green);font-size:.74rem;margin-top:6px;font-family:var(--mono)}

/* Forms */
.form-group{margin-bottom:14px}
.form-group label{
  display:block;font-size:.68rem;font-weight:700;color:var(--text2);
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono);
}
.inp{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:9px 13px;border-radius:9px;
  font-family:var(--font);font-size:.84rem;outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
select.inp{cursor:pointer}
select.inp option{background:var(--surface2)}
textarea.inp{resize:vertical;min-height:88px;font-family:var(--font)}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Toast */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:12px;padding:12px 16px;font-size:.8rem;
  z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:280px;
  animation:toastIn .3s ease;
}
.toast.s{border-color:rgba(0,245,147,.4)}
.toast.e{border-color:rgba(255,77,109,.4)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════ ADMIN ═══════════════════════════════════════ */
.admin-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);backdrop-filter:blur(14px);
  z-index:400;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;
}
.admin-overlay.open{display:flex}
.admin-modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  width:100%;max-width:1020px;margin:auto;
  display:flex;flex-direction:column;
  animation:modalIn .3s cubic-bezier(.2,.8,.3,1);
  max-height:90vh;overflow:hidden;
}
.admin-modal-head{
  padding:20px 28px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.admin-modal-head h2{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:10px}
.admin-modal-body{overflow-y:auto;flex:1}
.admin-layout{display:grid;grid-template-columns:220px 1fr;height:100%}
.admin-sidebar{border-right:1px solid var(--border);padding:16px 12px}
.admin-sidebar-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:9px;cursor:pointer;transition:all .2s;
  font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:3px;
  border:1px solid transparent;
}
.admin-sidebar-item:hover{background:var(--surface2);color:var(--text)}
.admin-sidebar-item.active{background:rgba(108,99,255,.12);border-color:rgba(108,99,255,.25);color:var(--text)}
.admin-sidebar-sep{height:1px;background:var(--border);margin:10px 4px}
.admin-content{padding:24px;overflow-y:auto}
.admin-page{display:none}
.admin-page.active{display:block}

/* Firebase status */
.fb-status{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:.65rem;padding:4px 10px;border-radius:100px;
}
.fb-status.ok{color:var(--green);background:rgba(0,245,147,.08);border:1px solid rgba(0,245,147,.2)}
.fb-status.loading{color:var(--gold);background:rgba(255,201,71,.08);border:1px solid rgba(255,201,71,.2)}
.fb-status.err{color:var(--red);background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}

/* Toggle */
.toggle{
  width:40px;height:22px;background:var(--border2);border-radius:100px;
  border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.toggle::after{
  content:'';position:absolute;width:16px;height:16px;background:white;
  border-radius:50%;top:3px;left:3px;transition:transform .2s;
}
.toggle.on{background:var(--green)}
.toggle.on::after{transform:translateX(18px)}

/* ═══════════════════════════════════════ FOOTER ═══════════════════════════════════════ */
footer{
  position:relative;z-index:1;border-top:1px solid var(--border);
  padding:36px;text-align:center;
}
.footer-logo{font-family:var(--mono);font-size:.95rem;font-weight:700;margin-bottom:6px}
.footer-logo span{color:var(--cyan)}
footer p{font-size:.74rem;color:var(--text3);font-family:var(--mono);line-height:1.8}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}

/* Grid */
.grid-services{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.grid-projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

.empty-state{
  text-align:center;padding:80px 20px;color:var(--text3);
  font-family:var(--mono);font-size:.82rem;grid-column:1/-1;
}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:14px;opacity:.5}

.badge-beta{
  display:inline-block;font-family:var(--mono);font-size:.6rem;
  background:rgba(255,201,71,.12);color:var(--gold);
  border:1px solid rgba(255,201,71,.3);padding:3px 8px;border-radius:4px;
  font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:8px;
}

/* Hidden */
.hidden{display:none !important}

@media(max-width:768px){
  header{padding:0 16px}
  nav{display:none}
  .hero{padding:56px 20px 44px}
  .section{padding:0 16px 60px}
  .admin-layout{grid-template-columns:1fr}
  .admin-sidebar{display:none}
  .form-grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <a href="#" class="logo" onclick="goHome()">
    <div class="logo-icon">
      <img src="https://raw.githubusercontent.com/Capky/CapWorks-Studio/main/CWS_Logo.png" alt="CWS" onerror="this.parentElement.textContent='⚡'">
    </div>
    CapWorks<span> Studio</span>
  </a>
  <nav>
    <a href="#" onclick="currentPage='services'; renderCurrentPage()" class="nav-link active" data-page="services">Services</a>
    <a href="#" onclick="currentPage='projects'; renderCurrentPage()" class="nav-link" data-page="projects">Projets</a>
    <a href="#" onclick="currentPage='contact'; renderCurrentPage()" class="nav-link" data-page="contact">Contact</a>
    <a href="#" onclick="currentPage='about'; renderCurrentPage()" class="nav-link" data-page="about">À propos</a>
  </nav>
  <div class="header-right" id="headerRight">
    <span class="fb-status loading" id="fbStatus"><span class="spin">⟳</span> Firebase</span>

  </div>
</header>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <div class="hero-aurora"></div>
  <div class="hero-tag"><div class="pulse"></div> CapWorks Studio · v3.0</div>
  <h1>Bienvenue chez <em>CapWorks Studio</em></h1>
  <p id="heroText">Services personnalisés, projets incroyables — tout en un seul endroit.</p>

    <div id="projModalContent"></div>

</div>

<script>
/* ══════════════════════════════════════════════════════ CONSTANTS ══════════════════════════════════════════════════════ */
const CWS_LOGO = 'https://raw.githubusercontent.com/Capky/CapWorks-Studio/main/CWS_Logo.png';
const EMOJIS = ['😎','🧑‍💻','👾','🦊','🐺','🐉','🦋','🌟','⚡','🎯','🦁','🐸'];
const CATS = ['sites','games','software','animations','bots','ai','assets','other'];

/* ══════════════════════════════════════════════════════ STATE ══════════════════════════════════════════════════════ */
let db = null, FB = null;
let currentPage = 'services';
let currentUser = null;
let adminLoggedIn = false;
let adminPassword = 'admin123';
let servicesEnabled = true;

// Firestore data
let services = [];
let team = [];
let users = {};
let tickets = {};
let projects = {};
let settings = {};
let devis = [];
let improvements = [];

// Device tracking for likes/views
let deviceId = sessionStorage.getItem('cw_device_id') || generateDeviceId();
let likedProjects = new Set(); // Project IDs already liked
let viewedProjects = new Set(); // Project IDs already viewed

CATS.forEach(c => projects[c] = []);

function generateDeviceId() {
  const id = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
  sessionStorage.setItem('cw_device_id', id);
  return id;
}

/* ══════════════════════════════════════════════════════ FIREBASE INIT ══════════════════════════════════════════════════════ */
function waitForFirebase() {
  return new Promise(resolve => {
    if (window.__firebaseReady) { resolve(); return; }
    document.addEventListener('firebase-ready', resolve, { once: true });
    setTimeout(resolve, 6000);
  });
}

async function initFirebase() {
  await waitForFirebase();
  if (!window.__db) { setFbStatus('err', '✕ Firebase'); return; }
  db = window.__db;
  FB = window.__firebase;
  setFbStatus('ok', '✓ Firebase');
  emailjs.init('-Y8WjfvgdGTW69eYQ');
  await loadAllData();
}

function setFbStatus(type, text) {
  const el = document.getElementById('fbStatus');
  if (!el) return;
  el.className = `fb-status ${type}`;
  el.textContent = text;
}

async function loadAllData() {
  if (!db) return;
  try {
    // Load settings
    const settingsSnap = await FB.getDoc(FB.doc(db, 'settings', 'global'));
    if (settingsSnap.exists()) {
      Object.assign(settings, settingsSnap.data());
      servicesEnabled = settings.servicesEnabled !== false;
      adminPassword = settings.adminPassword || 'admin123';
    }

    // Load services, team, users
    const sSnap = await FB.getDocs(FB.collection(db, 'services'));
    services = [];
    sSnap.forEach(d => services.push({ id: d.id, ...d.data() }));

    const tSnap = await FB.getDocs(FB.collection(db, 'team'));
    team = [];
    tSnap.forEach(d => team.push({ id: d.id, ...d.data() }));

    const uSnap = await FB.getDocs(FB.collection(db, 'users'));
    users = {};
    uSnap.forEach(d => users[d.id] = d.data());

    const ticsSnap = await FB.getDocs(FB.collection(db, 'tickets'));
    tickets = {};
    ticsSnap.forEach(d => {
      const u = d.data().user;
      if (!tickets[u]) tickets[u] = [];
      tickets[u].push({ id: d.id, ...d.data() });
    });

    // Load projects
    for (const cat of CATS) {
      const pSnap = await FB.getDocs(FB.collection(db, `projects_${cat}`));
      projects[cat] = [];
      pSnap.forEach(d => projects[cat].push({ id: d.id, ...d.data() }));
      projects[cat].sort((a, b) => (a.order || 999) - (b.order || 999));
    }

    // Load devis & improvements
    const dSnap = await FB.getDocs(FB.collection(db, 'devis'));
    devis = [];
    dSnap.forEach(d => devis.push({ id: d.id, ...d.data() }));

    const iSnap = await FB.getDocs(FB.collection(db, 'improvements'));
    improvements = [];
    iSnap.forEach(d => improvements.push({ id: d.id, ...d.data() }));

    renderCurrentPage();
    setFbStatus('ok', '✓ Prêt');
  } catch(e) {
    console.error(e);
    setFbStatus('err', '✕ Erreur');
    toast('Erreur chargement', 'e');
  }
}

/* ══════════════════════════════════════════════════════ PAGE ROUTING ══════════════════════════════════════════════════════ */
function renderCurrentPage() {
  const content = document.getElementById('mainContent');
  const heroText = document.getElementById('heroText');

  document.querySelectorAll('.nav-link').forEach(a => {
    const page = a.getAttribute('data-page');
    a.classList.toggle('active', page === currentPage);
  });

  if (currentPage === 'services') {
    heroText.textContent = 'Nos services personnalisés — jeux, logiciels, bots et bien plus.';
    content.innerHTML = servicesEnabled ? renderServices() : renderServicesBeta();
  } else if (currentPage === 'projects') {
    heroText.textContent = 'Nos projets réalisés — découvrez notre portfolio.';
    content.innerHTML = renderProjects();
  } else if (currentPage === 'contact') {
    heroText.textContent = 'Contactez-nous — formulaire simple et direct.';
    content.innerHTML = renderContact();
  } else if (currentPage === 'about') {
    heroText.textContent = 'À propos de CapWorks Studio — notre histoire.';
    content.innerHTML = renderAbout();
  }
}

function renderServicesBeta() {
  return `
    <div class="empty-state" style="padding:120px 20px;">
      <div class="empty-icon">🔧</div>
      <h2 style="font-size:1.4rem;margin-bottom:8px;color:var(--text);">Services en maintenance</h2>
      <p style="font-size:.88rem;color:var(--text2);">Notre plateforme de services est actuellement en développement.<br>En attendant, découvrez nos <a href="#" onclick="currentPage='projects';renderCurrentPage()" style="color:var(--accent);text-decoration:underline;">projets</a> ou <a href="#" onclick="currentPage='contact';renderCurrentPage()" style="color:var(--accent);text-decoration:underline;">nous contacter</a>.</p>
    </div>`;
}

function renderServices() {
  return `
    <h2 class="section-label" style="display:block;margin-bottom:24px;">📦 // NOS SERVICES</h2>
    <div class="grid-services" id="servicesGrid"></div>
    <h2 class="section-label" style="display:block;margin-top:60px;margin-bottom:24px;">👥 // NOTRE ÉQUIPE</h2>
    <div class="grid-auto" id="teamGrid"></div>
    ` + renderServicesContent();
}

function renderServicesContent() {
  const grid = document.querySelector('#servicesGrid');
  if (!grid && services.length > 0) setTimeout(() => {
    const g = document.querySelector('#servicesGrid');
    if (g) g.innerHTML = services.map((s, i) => buildServiceCard(s, i)).join('');
  }, 10);

  const tGrid = document.querySelector('#teamGrid');
  if (!tGrid && team.length > 0) setTimeout(() => {
    const g = document.querySelector('#teamGrid');
    if (g) g.innerHTML = team.map((t, i) => buildTeamCard(t, i)).join('');
  }, 10);

  return '';
}

function renderProjects() {
  const cats = CATS.filter(c => projects[c].length > 0);
  return cats.map(cat => {
    const items = projects[cat];
    return `
      <div style="margin-bottom:60px;">
        <h2 class="section-label" style="display:block;margin-bottom:24px;">${CATS.indexOf(cat) > 0 ? '' : ''}${getCatIcon(cat)} // ${getCatLabel(cat).toUpperCase()}</h2>
        <div class="grid-projects" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;">
          ${items.map((p, i) => buildProjectCard(cat, p, i)).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderContact() {
  if (!currentUser) {
    return `<div style="max-width:600px;margin:0 auto;">
      <div style="background:rgba(108,99,255,.06);border:1px solid rgba(108,99,255,.18);border-radius:12px;padding:24px;text-align:center;margin-bottom:32px;">
        <h3 style="font-size:1.1rem;margin-bottom:8px;">🔐 Connexion requise</h3>
        <p style="color:var(--text2);font-size:.88rem;margin-bottom:20px;">Connectez-vous pour accéder à plus d'options (devis, rapports d'améliorations, support).</p>
        <button class="btn-accent" style="padding:10px 20px;" onclick="openAuth('login')">Se connecter</button>
      </div>
      ${renderContactForm(false)}
    </div>`;
  }
  return `<div style="max-width:600px;margin:0 auto;">
    ${renderContactForm(true)}
    ${currentUser.role === 'admin' ? renderAdminContactPanel() : ''}
  </div>`;
}

function renderContactForm(fullAccess) {
  return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:32px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:20px;">📬 Formulaire de contact</h3>
      <div class="form-group">
        <label>Nom *</label>
        <input type="text" class="inp" id="cf-name" placeholder="Votre nom">
      </div>
      <div class="form-group">
        <label>Email ou téléphone *</label>
        <input type="text" class="inp" id="cf-contact" placeholder="exemple@mail.com ou 06 12 34 56 78">

      <div class="form-group">

        <select class="inp" id="cf-type">
          <option value="">-- Sélectionner --</option>
          <option value="general">📧 Demande générale</option>
          ${fullAccess ? '<option value="devis">💼 Devis personnalisé</option>' : ''}
          ${fullAccess ? '<option value="improvement">💡 Suggestion / Amélioration</option>' : ''}
          <option value="bug">🐛 Signaler un bug</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea class="inp" id="cf-desc" rows="5" placeholder="Détaillez votre demande..."></textarea>

      ${fullAccess ? `

          <label>Budget estimé (optionnel) - pour devis</label>
          <input type="text" class="inp" id="cf-budget" placeholder="Ex: 500€ - 2000€">

      ` : ''}
      <div class="err-msg" id="cfErr"></div>
      <button class="btn-primary" onclick="submitContactForm()">Envoyer →</button>

}

function renderAdminContactPanel() {
  const devisCount = devis.length;
  const improvementsCount = improvements.length;
  return `
    <div style="background:rgba(108,99,255,.06);border:1px solid rgba(108,99,255,.18);border-radius:12px;padding:24px;">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:16px;">👨‍💼 Panneau contact (Admin)</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;">
          <div style="font-size:1.8rem;margin-bottom:4px;">💼</div>
          <div style="font-size:.82rem;font-weight:700;">Devis reçus</div>
          <div style="font-size:1.4rem;color:var(--cyan);font-weight:700;">${devisCount}</div>
          <button class="btn-ghost" style="font-size:.7rem;margin-top:8px;width:100%;padding:6px;" onclick="adminViewDevis()">Voir</button>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;">
          <div style="font-size:1.8rem;margin-bottom:4px;">💡</div>
          <div style="font-size:.82rem;font-weight:700;">Suggestions</div>
          <div style="font-size:1.4rem;color:var(--green);font-weight:700;">${improvementsCount}</div>
          <button class="btn-ghost" style="font-size:.7rem;margin-top:8px;width:100%;padding:6px;" onclick="adminViewImprovements()">Voir</button>
        </div>
      </div>
    </div>`;
}

function renderAbout() {
  const totalProjects = Object.values(projects).reduce((a, b) => a + b.length, 0);
  const totalUsers = Object.keys(users).length;
  return `
    <div style="max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:40px;">
      
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;">
        <h3 style="font-size:1.4rem;font-weight:800;margin-bottom:16px;">📊 Stats CapWorks Studio</h3>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px;">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;">
            <div style="font-size:2.2rem;color:var(--cyan);font-weight:700;">${totalProjects}</div>
            <div style="font-size:.82rem;color:var(--text2);margin-top:6px;">Projets réalisés</div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;">

            <div style="font-size:.82rem;color:var(--text2);margin-top:6px;">Membres d'équipe</div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;">
            <div style="font-size:2.2rem;color:var(--gold);font-weight:700;">${totalUsers}</div>
            <div style="font-size:.82rem;color:var(--text2);margin-top:6px;">Utilisateurs</div>
          </div>
        </div>
      </div>

      <div>
        <h3 style="font-size:1.2rem;font-weight:800;margin-bottom:16px;">📖 Notre histoire</h3>
        <p style="color:var(--text2);font-size:.9rem;line-height:1.8;margin-bottom:12px;">
          CapWorks Studio a été créé pour transformer vos idées en réalité. Depuis nos débuts, nous avons développé des dizaines de projets allant de sites web modernes à des jeux vidéo, en passant par des bots Discord et des outils IA.
        </p>
        <p style="color:var(--text2);font-size:.9rem;line-height:1.8;">
          Notre équipe passionnée travaille chaque jour pour offrir des solutions de qualité, innovantes et adaptées à vos besoins.
        </p>
      </div>

      <div>
        <h3 style="font-size:1.2rem;font-weight:800;margin-bottom:16px;">👥 L'équipe</h3>
        <div class="grid-auto">
          ${team.map((t, i) => buildTeamCard(t, i)).join('')}
        </div>
      </div>

      <div>
        <h3 style="font-size:1.2rem;font-weight:800;margin-bottom:16px;">🙏 Remerciements</h3>
        <p style="color:var(--text2);font-size:.9rem;line-height:1.8;">
          Merci à <strong>Firebase</strong>, <strong>Stripe</strong>, <strong>PayPal</strong>, <strong>Figma</strong> et tous nos clients pour leur confiance.<br>
          <a href="https://discord.gg/52AJ2jgHda" target="_blank" style="color:var(--accent);text-decoration:underline;">Rejoignez notre Discord</a> pour rester connecté !

      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════ CARD BUILDERS ══════════════════════════════════════════════════════ */
function buildServiceCard(svc, idx) {
  return `
    <div class="card" style="animation-delay:${idx*0.06}s;">
      <div class="card-media compact" style="background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(0,212,255,.08));">
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.4rem;">${svc.icon || '📦'}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(svc.name || 'Service')}</div>
        <div class="card-desc">${esc(svc.desc || '')}</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${(svc.tiers||[]).map((t, i) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--surface2);border-radius:8px;font-size:.75rem;">
              <span>${esc(t.name)}</span>
              <span style="color:var(--accent);font-weight:700;">${t.free ? 'Gratuit' : t.price + '€'}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function buildTeamCard(member, idx) {
  return `
    <div class="card" style="text-align:center;animation-delay:${idx*0.08}s;">
      <div style="font-size:3rem;padding:20px;">${member.avatar || '👤'}</div>
      <div class="card-body">
        <div class="card-title">${esc(member.name || 'Membre')}</div>
        <div style="font-family:var(--mono);font-size:.7rem;color:var(--cyan);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">${member.role || 'Équipe'}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;">
          ${(member.tags||[]).map(tag => `<span style="font-size:.65rem;background:rgba(108,99,255,.1);color:var(--accent);padding:3px 8px;border-radius:100px;">${esc(tag)}</span>`).join('')}
        </div>
      </div>
    </div>`;
}

function buildProjectCard(cat, proj, idx) {
  return `
    <div class="card" style="cursor:pointer;animation-delay:${idx*0.06}s;" onclick="openProjectModal('${cat}','${esc(proj.id)}')">
      ${proj.imageUrl ? `<div class="card-media ratio-16-9" style="background-image:url('${esc(proj.imageUrl)}');background-size:cover;background-position:center;"></div>` : '<div class="card-media compact" style="background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(0,212,255,.08));display:flex;align-items:center;justify-content:center;font-size:2rem;">📁</div>'}
      <div class="card-body">
        <div class="card-title">${esc(proj.title || 'Projet')}</div>
        <div class="card-desc">${esc(proj.desc || '')}</div>
        <div class="card-footer">
          <button class="like-btn${isLiked(proj.id) ? ' liked' : ''}" onclick="toggleLike('${cat}','${esc(proj.id)}',event)" style="margin-top:8px;">❤ ${proj.likes||0}</button>
        </div>
      </div>
    </div>`;
}

function getCatIcon(cat) {
  const icons = { sites:'🌐', games:'🎮', software:'⚙️', animations:'🎬', bots:'🤖', ai:'🧠', assets:'📦', other:'◈' };
  return icons[cat] || '📁';
}

function getCatLabel(cat) {
  const labels = { sites:'Sites', games:'Jeux vidéos', software:'Logiciels', animations:'Animations', bots:'Bots', ai:'IA', assets:'Assets', other:'Autres' };
  return labels[cat] || cat;
}

/* ══════════════════════════════════════════════════════ PROJECTS ══════════════════════════════════════════════════════ */
function isLiked(projId) {
  return likedProjects.has(projId);
}

function toggleLike(cat, projId, e) {
  e.stopPropagation();
  if (isLiked(projId)) {
    likedProjects.delete(projId);
  } else {
    likedProjects.add(projId);
    if (db) incrementStat(cat, projId, 'likes');
  }
  const proj = projects[cat]?.find(p => p.id === projId);
  if (proj) proj.likes = (proj.likes || 0) + 1;
  renderCurrentPage();
  toast(isLiked(projId) ? '❤️ Aimé !' : 'Retiré des favoris', 's');
}

function openProjectModal(cat, projId) {
  const proj = projects[cat]?.find(p => p.id === projId);
  if (!proj) return;

  if (!viewedProjects.has(projId)) {
    viewedProjects.add(projId);
    if (db) incrementStat(cat, projId, 'views');
    proj.views = (proj.views || 0) + 1;
  }

  const modal = document.getElementById('projModalContent');
  modal.innerHTML = `
    ${proj.imageUrl ? `<div class="card-media ratio-16-9" style="background-image:url('${esc(proj.imageUrl)}');background-size:cover;background-position:center;border-radius:20px 20px 0 0;"></div>` : ''}
    <div class="card-body" style="padding:28px 32px;">
      <h2 style="font-size:1.6rem;font-weight:800;margin-bottom:12px;">${esc(proj.title || 'Projet')}</h2>
      <p style="color:var(--text2);font-size:.88rem;line-height:1.8;margin-bottom:20px;">${esc(proj.desc || '')}</p>
      ${proj.longDesc ? `<p style="color:var(--text2);font-size:.85rem;line-height:1.8;margin-bottom:20px;white-space:pre-wrap;">${esc(proj.longDesc)}</p>` : ''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
        ${proj.url ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;"><div style="font-size:.65rem;font-weight:700;color:var(--text3);margin-bottom:4px;">🔗 URL</div><div style="font-size:.85rem;color:var(--text);">${esc(proj.url)}</div></div>` : ''}
        ${proj.tech ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;"><div style="font-size:.65rem;font-weight:700;color:var(--text3);margin-bottom:4px;">🛠 Technos</div><div style="font-size:.85rem;color:var(--text);">${esc(proj.tech)}</div></div>` : ''}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${proj.downloadUrl ? `<a class="btn-cta success" href="${esc(proj.downloadUrl)}" target="_blank" onclick="incrementStat('${cat}','${projId}','downloads')">⬇ Télécharger</a>` : ''}
        ${proj.url ? `<a class="btn-cta outline" href="${esc(proj.url)}" target="_blank">🔗 Visiter</a>` : ''}
        <button class="like-btn${isLiked(projId) ? ' liked' : ''}" onclick="toggleLike('${cat}','${esc(projId)}',event)">❤ ${proj.likes||0}</button>
      </div>
    </div>`;

  document.getElementById('projOverlay').classList.add('open');
}

async function incrementStat(cat, id, field) {
  if (!db) return;
  try {
    await FB.updateDoc(FB.doc(db, `projects_${cat}`, id), { [field]: FB.increment(1) });
  } catch(e) { console.error(e); }
}

/* ══════════════════════════════════════════════════════ CONTACT ══════════════════════════════════════════════════════ */
async function submitContactForm() {
  const name = document.getElementById('cf-name')?.value.trim();
  const contact = document.getElementById('cf-contact')?.value.trim();
  const type = document.getElementById('cf-type')?.value;
  const desc = document.getElementById('cf-desc')?.value.trim();
  const budget = document.getElementById('cf-budget')?.value.trim();
  const err = document.getElementById('cfErr');

  if (!name || !contact || !type || !desc) {
    err.textContent = '✕ Remplissez les champs obligatoires';
    return;
  }

  if (!db) { toast('Firebase non configuré', 'e'); return; }

  try {
    const docRef = await FB.addDoc(FB.collection(db, type === 'improvement' ? 'improvements' : type === 'devis' ? 'devis' : 'contact'), {
      name, contact, type, desc, budget: budget || '', author: currentUser?.username || 'Anonyme',
      createdAt: FB.serverTimestamp(), status: 'new', read: false
    });

    if (type === 'devis') devis.push({ id: docRef.id, name, contact, type, desc, budget, author: currentUser?.username || 'Anonyme', status: 'new' });
    if (type === 'improvement') improvements.push({ id: docRef.id, name, contact, type, desc, author: currentUser?.username || 'Anonyme', status: 'new' });

    document.getElementById('cf-name').value = '';
    document.getElementById('cf-contact').value = '';
    document.getElementById('cf-type').value = '';
    document.getElementById('cf-desc').value = '';
    if (document.getElementById('cf-budget')) document.getElementById('cf-budget').value = '';

    toast('✓ Message envoyé ! Nous vous répondrons bientôt.', 's');
  } catch(e) {
    console.error(e);
    err.textContent = '✕ Erreur lors de l\'envoi';
  }
}

function adminViewDevis() {
  alert('Devis: ' + devis.map(d => `${d.name} - ${d.desc.slice(0,30)}...`).join('\n'));
}

function adminViewImprovements() {
  alert('Suggestions: ' + improvements.map(i => `${i.author} - ${i.desc.slice(0,30)}...`).join('\n'));
}

/* ══════════════════════════════════════════════════════ AUTH ══════════════════════════════════════════════════════ */
function openAuth(tab) {
  document.getElementById('authOverlay').classList.add('open');
  renderAuthForm(tab);
}

function renderAuthForm(tab) {
  const body = document.getElementById('authBody');
  document.getElementById('authTitle').textContent = tab === 'login' ? 'Connexion' : 'Créer un compte';

  if (tab === 'login') {
    body.innerHTML = `
      <div class="form-group">
        <label>Pseudo</label>
        <input type="text" class="inp" id="l-user" placeholder="Pseudo">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" class="inp" id="l-pass" placeholder="Mot de passe" onkeypress="if(event.key==='Enter')doLogin()">
      </div>
      <div class="err-msg" id="l-err"></div>
      <button class="btn-primary" onclick="doLogin()">Connexion →</button>
      <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="renderAuthForm('register')">Créer un compte</button>
    `;
  } else {
    body.innerHTML = `
      <div class="form-group">
        <label>Pseudo</label>
        <input type="text" class="inp" id="r-user" placeholder="Pseudo">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" class="inp" id="r-email" placeholder="Email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" class="inp" id="r-pass" placeholder="Min. 6 caractères">
      </div>
      <div class="err-msg" id="r-err"></div>
      <button class="btn-primary" id="r-btn" onclick="startRegister()">Continuer →</button>
      <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="renderAuthForm('login')">Retour</button>
    `;
  }
}

function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');

  if (!u || !p) { err.textContent = '✕ Remplissez tous les champs'; return; }
  if (!users[u]) { err.textContent = '✕ Utilisateur introuvable'; return; }
  if (hashPass(p) !== users[u].hash) { err.textContent = '✕ Mot de passe incorrect'; return; }

  currentUser = { username: u, role: users[u].role || 'user' };
  updateHeaderUser();
  closeOverlay('authOverlay');
  toast(`Bienvenue ${u} !`, 's');
}

async function startRegister() {
  const u = document.getElementById('r-user').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const p = document.getElementById('r-pass').value;
  const err = document.getElementById('r-err');

  if (!u || !email || !p) { err.textContent = '✕ Remplissez tous les champs'; return; }
  if (u.length < 2 || u.length > 20) { err.textContent = '✕ Pseudo: 2-20 caractères'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = '✕ Email invalide'; return; }
  if (p.length < 6) { err.textContent = '✕ Mot de passe: min 6 caractères'; return; }
  if (users[u]) { err.textContent = '✕ Pseudo déjà pris'; return; }

  const otp = String(Math.floor(100000 + Math.random() * 900000));
  sessionStorage.setItem('pending_reg', JSON.stringify({ u, email, p, otp }));

  try {
    await emailjs.send('service_kee805w', 'template_ueewv6y', { to_email: email, to_name: u, code: otp });
    showOTPForm();
  } catch(e) {
    err.textContent = '✕ Erreur envoi email';
  }
}

function showOTPForm() {
  const body = document.getElementById('authBody');
  body.innerHTML = `
    <p style="text-align:center;color:var(--text2);font-size:.85rem;margin-bottom:20px;">Code OTP envoyé à votre email. Entrez-le ci-dessous.</p>
    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:20px;">
      ${[0,1,2,3,4,5].map(i => `<input type="text" maxlength="1" class="inp" id="otp${i}" style="width:45px;text-align:center;font-size:1.2rem;padding:8px;" oninput="otpInput(this,${i})" onkeydown="otpKey(event,${i})">`).join('')}
    </div>
    <div class="err-msg" id="otp-err"></div>
    <button class="btn-primary" onclick="verifyOTP()">Vérifier →</button>
  `;
  setTimeout(() => document.getElementById('otp0').focus(), 100);
}

function otpInput(el, idx) {
  el.value = el.value.replace(/\D/g, '');
  if (el.value && idx < 5) document.getElementById(`otp${idx+1}`).focus();
}

function otpKey(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 0) document.getElementById(`otp${idx-1}`).focus();
}

async function verifyOTP() {
  const entered = [0,1,2,3,4,5].map(i => document.getElementById(`otp${i}`)?.value || '').join('');
  const pending = JSON.parse(sessionStorage.getItem('pending_reg') || '{}');
  const err = document.getElementById('otp-err');

  if (entered !== pending.otp) { err.textContent = '✕ Code incorrect'; return; }

  users[pending.u] = { hash: hashPass(pending.p), role: 'user', email: pending.email, emoji: EMOJIS[Math.floor(Math.random()*EMOJIS.length)] };

  if (db) {
    try {
      await FB.setDoc(FB.doc(db, 'users', pending.u), users[pending.u]);
    } catch(e) { console.error(e); }
  }

  currentUser = { username: pending.u, role: 'user' };
  sessionStorage.removeItem('pending_reg');
  updateHeaderUser();
  closeOverlay('authOverlay');
  toast(`Compte créé ! Bienvenue ${pending.u} !`, 's');
}

function hashPass(p) {
  let h = 0;
  for (let i = 0; i < p.length; i++) h = (Math.imul(31, h) + p.charCodeAt(i)) | 0;
  return h.toString(36);
}

/* ══════════════════════════════════════════════════════ ADMIN ══════════════════════════════════════════════════════ */
function openAdmin() {
  if (!adminLoggedIn) {
    document.getElementById('adminOverlay').classList.add('open');
    const body = document.getElementById('adminBody');
    body.innerHTML = `
      <div style="padding:56px 28px;text-align:center;">
        <div style="font-size:2.2rem;margin-bottom:14px;">🔐</div>
        <h4 style="font-size:1rem;font-weight:700;margin-bottom:6px;">Accès Admin</h4>
        <p style="color:var(--text2);font-size:.82rem;margin-bottom:22px;">Mot de passe requis</p>
        <div style="max-width:260px;margin:0 auto;display:flex;flex-direction:column;gap:8px;">
          <input type="password" class="inp" id="adminPw" placeholder="Mot de passe..." onkeypress="if(event.key==='Enter')tryAdminLogin()">
          <button class="btn-primary" onclick="tryAdminLogin()">Accéder →</button>
          <div class="err-msg" id="adminPwErr"></div>
        </div>
      </div>`;
  } else {
    renderAdminPanel();
  }
}

function tryAdminLogin() {
  const pw = document.getElementById('adminPw').value;
  if (pw !== adminPassword) { document.getElementById('adminPwErr').textContent = '✕ Incorrect'; return; }
  adminLoggedIn = true;
  document.getElementById('adminOverlay').classList.add('open');
  renderAdminPanel();
}

function renderAdminPanel() {
  const body = document.getElementById('adminBody');
  body.innerHTML = `
    <div class="admin-layout">
      <div class="admin-sidebar">
        <div class="admin-sidebar-item active" onclick="adminTab('services')">📦 Services</div>
        <div class="admin-sidebar-item" onclick="adminTab('projects')">🎮 Projets</div>
        <div class="admin-sidebar-sep"></div>
        <div class="admin-sidebar-item" onclick="adminTab('settings')">⚙ Paramètres</div>
      </div>
      <div class="admin-content" id="adminContent"></div>
    </div>`;
  adminTab('services');
}

function adminTab(tab) {
  document.querySelectorAll('.admin-sidebar-item').forEach(el => el.classList.remove('active'));
  event.target.closest('.admin-sidebar-item')?.classList.add('active');

  const content = document.getElementById('adminContent');
  if (tab === 'services') {
    content.innerHTML = `
      <h3 style="font-size:1rem;font-weight:800;margin-bottom:20px;">📦 Gestion Services</h3>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <span>Services activés :</span>
        <button class="toggle${servicesEnabled ? ' on' : ''}" onclick="toggleServices(this)"></button>
      </div>
      <div id="servicesList" style="display:flex;flex-direction:column;gap:10px;"></div>`;
    renderAdminServices();
  } else if (tab === 'projects') {
    content.innerHTML = `
      <h3 style="font-size:1rem;font-weight:800;margin-bottom:20px;">🎮 Gestion Projets</h3>
      <div id="projectsList" style="display:flex;flex-direction:column;gap:10px;"></div>`;
    renderAdminProjects();
  } else if (tab === 'settings') {
    content.innerHTML = `
      <h3 style="font-size:1rem;font-weight:800;margin-bottom:20px;">⚙ Paramètres</h3>
      <div class="form-group">
        <label>Mot de passe admin</label>
        <input type="password" class="inp" id="new-admin-pw" placeholder="Nouveau mot de passe">
        <button class="btn-primary" style="margin-top:8px;" onclick="updateAdminPw()">Changer</button>
        <div id="pw-msg"></div>
      </div>`;
  }
}

function toggleServices(btn) {
  servicesEnabled = !servicesEnabled;
  btn.classList.toggle('on', servicesEnabled);
  if (db) FB.setDoc(FB.doc(db, 'settings', 'global'), { servicesEnabled }, { merge: true });
  toast(servicesEnabled ? '✓ Services activés' : '✓ Services désactivés', 's');
}

function renderAdminServices() {
  const list = document.getElementById('servicesList');
  if (!list) return;
  list.innerHTML = services.length === 0 ? '<p style="color:var(--text3);">Aucun service</p>' :
    services.map(s => `
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
        <div><strong>${esc(s.name)}</strong><br><span style="font-size:.75rem;color:var(--text3);">${s.tiers?.length || 0} tiers</span></div>
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost" style="padding:4px 8px;font-size:.7rem;" onclick="editService('${s.id}')">✎</button>
          <button class="btn-ghost" style="padding:4px 8px;font-size:.7rem;color:var(--red);" onclick="delService('${s.id}')">🗑</button>
        </div>
      </div>`).join('');
}

function renderAdminProjects() {
  const list = document.getElementById('projectsList');
  if (!list) return;
  const total = Object.values(projects).reduce((a, b) => a + b.length, 0);
  list.innerHTML = `<p style="color:var(--text2);margin-bottom:20px;">Total: <strong>${total}</strong> projets</p>` +
    CATS.map(cat => `
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <strong>${getCatLabel(cat)}</strong>
          <span style="font-size:.8rem;color:var(--text3);">${projects[cat]?.length || 0}</span>
        </div>
      </div>`).join('');
}

function updateAdminPw() {
  const pw = document.getElementById('new-admin-pw').value;
  const msg = document.getElementById('pw-msg');
  if (!pw || pw.length < 6) { msg.className = 'err-msg'; msg.textContent = '✕ Min 6 caractères'; return; }
  adminPassword = pw;
  if (db) FB.setDoc(FB.doc(db, 'settings', 'global'), { adminPassword }, { merge: true });
  document.getElementById('new-admin-pw').value = '';
  msg.className = 'ok-msg'; msg.textContent = '✓ Mot de passe changé';
}

/* ══════════════════════════════════════════════════════ UTILITIES ══════════════════════════════════════════════════════ */
function updateHeaderUser() {
  const hr = document.getElementById('headerRight');
  if (!hr) return;
  if (currentUser) {
    const isAdmin = currentUser.role === 'admin';
    hr.innerHTML = `
      <span class="fb-status ok" id="fbStatus"><span class="spin">⟳</span> Firebase</span>
      ${isAdmin ? `<button class="btn-ghost" onclick="openAdmin()">⚙ Admin</button>` : ''}
      <div class="user-chip">
        ${users[currentUser.username]?.emoji || '👤'} ${esc(currentUser.username)}
        <span style="color:var(--text3);cursor:pointer;" onclick="logout()">✕</span>
      </div>`;
  } else {
    hr.innerHTML = `
      <span class="fb-status loading" id="fbStatus"><span class="spin">⟳</span> Firebase</span>
      <button class="btn-ghost" onclick="openAdmin()">⚙ Admin</button>
      <button class="btn-accent" onclick="openAuth('login')">🔑 Connexion</button>`;
  }
}

function logout() {
  currentUser = null;
  adminLoggedIn = false;
  updateHeaderUser();
  closeOverlay('authOverlay');
  closeOverlay('adminOverlay');
  toast('Déconnecté', 's');
}

function goHome() {
  currentPage = 'services';
  renderCurrentPage();
}

function closeOverlay(id) {
  document.getElementById(id)?.classList.remove('open');
}

function handleOvClick(e, id) {
  if (e.target === document.getElementById(id)) closeOverlay(id);
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type='s') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(10px)'; t.style.transition='all .3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

/* ══════════════════════════════════════════════════════ INIT ══════════════════════════════════════════════════════ */
updateHeaderUser();
initFirebase();
</script>
