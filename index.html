<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#050816;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* 🌌 BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-2;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(53,214,255,.2);
z-index:10;
}

.logo{
font-weight:900;
font-size:20px;
}
.logo span:first-child{
color:#35d6ff;
text-shadow:0 0 10px #35d6ff;
}
.logo span:last-child{
color:#ff3355;
text-shadow:0 0 10px #ff3355;
}

/* MENU */
.menu button{
padding:10px 16px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:800;
background:linear-gradient(90deg,#35d6ff,#ff3355);
color:white;
}

/* SCREEN */
.screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding-top:60px;
}

h1{
font-size:62px;
background:linear-gradient(90deg,#fff,#35d6ff,#ff3355);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
opacity:.7;
margin-top:10px;
}

/* PROJECTS */
.projects{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.card{
width:260px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(53,214,255,.2);
transition:.2s;
}

.card:hover{
transform:translateY(-4px);
border-color:#35d6ff;
}

/* 📦 DEPLOY BOX */
.deploy{
position:fixed;
bottom:12px;
right:12px;
padding:12px 14px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(53,214,255,.2);
backdrop-filter:blur(10px);
font-family:monospace;
font-size:12px;
min-width:220px;
}

#deployStatus{
font-weight:800;
color:#35ff9a;
margin-bottom:4px;
}

.deploy.warn #deployStatus{color:#ffcc00}
.deploy.error #deployStatus{color:#ff3355}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<div class="logo"><span>CapWorks</span> <span>Studio</span></div>
<div class="menu">
<button onclick="showProjects()">PROJECTS</button>
</div>
</header>

<!-- HOME -->
<div class="screen" id="home">
<h1>NEURAL SYSTEM</h1>
<p>Cyber infrastructure interface</p>
</div>

<!-- DEPLOY STATUS -->
<div id="deployBox" class="deploy">
<div id="deployStatus">🟢 Site à jour</div>
<div id="deployInfo">Aucune modification récente</div>
</div>

<script>

/* NAV SIMPLE */
function showProjects(){
document.getElementById("home").innerHTML=`
<h1>PROJECTS</h1>
<div class="projects">
<div class="card">🌐 SITES</div>
<div class="card">🎮 JEUX</div>
<div class="card">🧠 LOGICIELS</div>
<div class="card">📦 AUTRES</div>
</div>
`;
}

/* 🌌 NEURAL WIRES */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* PIPE NETWORK */
let pipes=[];

/* create connected bent lines */
function createPipe(){
let x=Math.random()*c.width;
let y=Math.random()*c.height;

let segs=[];

for(let i=0;i<5;i++){
let dir=Math.random()<0.5?"x":"y";
let len=60+Math.random()*140;

let x2=x, y2=y;

if(dir==="x") x2+=len;
else y2+=len;

segs.push({x1:x,y1:y,x2,y2});

x=x2;
y=y2;
}

pipes.push(segs);
}

for(let i=0;i<12;i++)createPipe();

/* CURRENT PARTICLES */
let particles=[];

function spawn(){
pipes.forEach(p=>{
let s=p[0];
particles.push({
p,
i:0,
t:0,
speed:0.002+Math.random()*0.003
});
});
}

/* LOOP */
function loop(){
ctx.clearRect(0,0,c.width,c.height);

/* WIRES */
ctx.strokeStyle="rgba(53,214,255,.18)";
ctx.lineWidth=2;

pipes.forEach(p=>{
p.forEach(s=>{
ctx.beginPath();
ctx.moveTo(s.x1,s.y1);
ctx.lineTo(s.x2,s.y2);
ctx.stroke();
});
});

/* FLOW LIGHT */
particles.forEach((p,i)=>{
let seg=p.p[p.i];

if(!seg) return;

p.t+=p.speed;

let x=seg.x1+(seg.x2-seg.x1)*p.t;
let y=seg.y1+(seg.y2-seg.y1)*p.t;

ctx.fillStyle="#35d6ff";
ctx.beginPath();
ctx.arc(x,y,2,0,Math.PI*2);
ctx.fill();

if(p.t>=1){
p.i++;
p.t=0;
if(p.i>=p.p.length){
particles.splice(i,1);
}
}
});

/* irregular flow */
if(Math.random()>0.88)spawn();

requestAnimationFrame(loop);
}
loop();

/* 📦 DEPLOY SYSTEM */
const box=document.getElementById("deployBox");
const status=document.getElementById("deployStatus");
const info=document.getElementById("deployInfo");

function setDeploy(state,files=""){

if(state==="ok"){
box.className="deploy";
status.textContent="🟢 Site à jour";
info.textContent="Aucune modification récente";
}

if(state==="update"){
box.className="deploy warn";
status.textContent="🟡 Mise à jour détectée";
info.textContent="Modifié dans : "+files;
}

if(state==="deploy"){
box.className="deploy warn";
status.textContent="⏳ Déploiement...";
info.textContent="Publication en cours...";
}

if(state==="error"){
box.className="deploy error";
status.textContent="🔴 Erreur";
info.textContent="Rollback automatique";
}
}

/* simulation réaliste */
setTimeout(()=>setDeploy("update","index.html, style.css"),4000);
setTimeout(()=>setDeploy("deploy"),8000);
setTimeout(()=>setDeploy("ok"),12000);

</script>

</body>
</html>
